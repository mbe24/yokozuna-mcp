name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  verify-ci:
    name: Verify tag and CI status
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag format
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "Release tag '${GITHUB_REF_NAME}' is invalid."
            echo "Expected format like v0.2.2 (optional prerelease/build suffix allowed)."
            exit 1
          fi

      - name: Ensure package.json version matches release tag
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [[ "${pkg_version}" != "${tag_version}" ]]; then
            echo "Version mismatch:"
            echo "  tag version:    ${tag_version}"
            echo "  package.json:   ${pkg_version}"
            echo "Update package.json before creating/pushing the release tag."
            exit 1
          fi

      - name: Resolve tagged commit SHA
        id: commit
        shell: bash
        # For annotated tags GITHUB_SHA can be the tag object, not the commit —
        # peel the checked-out ref to the commit the CI run was recorded against.
        run: echo "sha=$(git rev-parse HEAD^{commit})" >> "$GITHUB_OUTPUT"

      - name: Wait for a successful CI run for this commit
        uses: actions/github-script@v7
        env:
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        with:
          # Tags are often pushed back-to-back with the commit, so the CI run for
          # the SHA may not exist yet (or still be running). Poll: first for the
          # run to APPEAR, then for it to CONCLUDE. Publish only on green.
          script: |
            const sha = process.env.COMMIT_SHA;
            const pollMs = 15_000;
            const appearDeadline = Date.now() + 3 * 60_000; // run should appear within seconds
            const concludeDeadline = Date.now() + 25 * 60_000; // CI itself takes a few minutes
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const latestRun = async () => {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "ci.yml",
                head_sha: sha,
                per_page: 100,
              });
              // The API returns runs newest-first; the newest attempt wins.
              return data.workflow_runs[0] ?? null;
            };

            let run = await latestRun();
            while (run === null && Date.now() < appearDeadline) {
              core.info(`No CI (ci.yml) run for ${sha} yet - waiting for it to appear...`);
              await sleep(pollMs);
              run = await latestRun();
            }
            if (run === null) {
              core.setFailed(
                `No CI (ci.yml) run appeared for commit ${sha} within 3 minutes. ` +
                  "Was this commit pushed to main? CI only runs for pull requests and " +
                  "pushes to main - push the commit there first, then re-run this " +
                  "workflow or delete and re-push the tag."
              );
              return;
            }

            core.info(`CI run for ${sha}: ${run.html_url}`);
            while (run.status !== "completed" && Date.now() < concludeDeadline) {
              core.info(`CI run status: ${run.status} - waiting for it to finish...`);
              await sleep(pollMs);
              run = await latestRun();
            }
            if (run.status !== "completed") {
              core.setFailed(
                `CI run for commit ${sha} did not finish within 25 minutes ` +
                  `(status: ${run.status}). Nothing was published - once CI is green, ` +
                  `re-run this workflow or delete and re-push the tag. ${run.html_url}`
              );
              return;
            }
            if (run.conclusion !== "success") {
              core.setFailed(
                `CI run for commit ${sha} concluded '${run.conclusion}', not 'success'. ` +
                  `Nothing was published. ${run.html_url}`
              );
              return;
            }
            core.info("CI succeeded for the tagged commit - publish may proceed.");

  publish:
    name: Publish to npm
    needs: verify-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm --provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish (with provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
