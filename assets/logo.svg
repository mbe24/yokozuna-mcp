<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="yokozuna-mcp logo: a levitating meditating sumo inside an enso circle, orbited by log lines">
  <defs>
    <radialGradient id="bg" cx="50%" cy="28%" r="90%">
      <stop offset="0%" stop-color="#242B52"/>
      <stop offset="55%" stop-color="#151A33"/>
      <stop offset="100%" stop-color="#0C101F"/>
    </radialGradient>
    <linearGradient id="enso" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8442E"/>
      <stop offset="55%" stop-color="#FF6A3C"/>
      <stop offset="100%" stop-color="#F6C453"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF5EA"/>
      <stop offset="100%" stop-color="#E3D9C4"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="softer" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- ambient glows -->
  <circle cx="176" cy="332" r="120" fill="#E8442E" opacity="0.14" filter="url(#softer)"/>
  <circle cx="368" cy="150" r="90" fill="#F6C453" opacity="0.12" filter="url(#softer)"/>

  <!-- enso (zen brush circle), gap at upper right -->
  <path d="M 302.1 80.1 A 178 178 0 1 0 392.4 137.6"
        fill="none" stroke="url(#enso)" stroke-width="22" stroke-linecap="round" opacity="0.95"/>
  <!-- brush taper hint at the lifted end -->
  <circle cx="302.1" cy="80.1" r="13" fill="#F6C453" opacity="0.9"/>

  <!-- log orbit, back half (behind the figure) -->
  <g transform="rotate(-14 256 300)">
    <path d="M 51 300 A 205 58 0 0 1 461 300"
          fill="none" stroke="#67E8F9" stroke-width="5" stroke-linecap="round"
          stroke-dasharray="2 16" opacity="0.45"/>
  </g>

  <!-- levitation glow beneath the figure -->
  <ellipse cx="256" cy="424" rx="100" ry="13" fill="#67E8F9" opacity="0.5" filter="url(#soft)"/>
  <ellipse cx="256" cy="424" rx="64" ry="6" fill="#A7F3FC" opacity="0.5"/>

  <!-- meditating sumo silhouette (lotus pose, hovering) -->
  <g fill="url(#body)">
    <!-- crossed legs -->
    <rect x="140" y="330" width="232" height="52" rx="26"/>
    <!-- arms, hands resting on knees -->
    <line x1="204" y1="216" x2="166" y2="328" stroke="url(#body)" stroke-width="32" stroke-linecap="round"/>
    <line x1="308" y1="216" x2="346" y2="328" stroke="url(#body)" stroke-width="32" stroke-linecap="round"/>
    <!-- pear-shaped torso (sumo belly) -->
    <path d="M 256 184
             C 210 184 186 214 178 258
             C 170 306 196 358 256 358
             C 316 358 342 306 334 258
             C 326 214 302 184 256 184 Z"/>
    <!-- head -->
    <circle cx="256" cy="152" r="38"/>
    <!-- chonmage topknot -->
    <ellipse cx="256" cy="109" rx="18" ry="9"/>
    <rect x="250" y="111" width="12" height="13" rx="5"/>
  </g>

  <!-- flat shading creases: arms, crossed legs, zen face -->
  <g fill="none" stroke="#C7B896" stroke-width="5" stroke-linecap="round" opacity="0.9">
    <path d="M 212 224 Q 184 270 176 318"/>
    <path d="M 300 224 Q 328 270 336 318"/>
    <path d="M 186 346 Q 256 330 326 346"/>
  </g>
  <!-- closed eyes (meditating) -->
  <g fill="none" stroke="#B9A883" stroke-width="4.5" stroke-linecap="round">
    <path d="M 234 152 q 7 6 14 0"/>
    <path d="M 264 152 q 7 6 14 0"/>
  </g>

  <!-- tsuna: the grand champion's white-gold rope belt -->
  <path d="M 174 298 Q 256 330 338 298" fill="none" stroke="#F6C453" stroke-width="20" stroke-linecap="round"/>
  <path d="M 178 300 Q 256 328 334 300" fill="none" stroke="#C9962E" stroke-width="3"
        stroke-dasharray="2 12" stroke-linecap="round" opacity="0.5"/>
  <!-- shide paper pendants -->
  <g fill="none" stroke="#F6C453" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 218 316 l 5 8 l -8 5 l 5 8"/>
    <path d="M 256 322 l 5 8 l -8 5 l 5 8"/>
    <path d="M 294 316 l 5 8 l -8 5 l 5 8"/>
  </g>

  <!-- log orbit, front half (passes in front of the figure) -->
  <g transform="rotate(-14 256 300)">
    <path d="M 51 300 A 205 58 0 0 0 461 300"
          fill="none" stroke="#67E8F9" stroke-width="5" stroke-linecap="round"
          stroke-dasharray="2 16" opacity="0.8"/>
  </g>

  <!-- drifting log-line chips -->
  <g>
    <g transform="translate(49 325)">
      <rect width="52" height="34" rx="8" fill="#0E1730" stroke="#67E8F9" stroke-width="2.5" opacity="0.95"/>
      <line x1="10" y1="11" x2="34" y2="11" stroke="#A7F3FC" stroke-width="4" stroke-linecap="round"/>
      <line x1="10" y1="18" x2="42" y2="18" stroke="#67E8F9" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
      <line x1="10" y1="25" x2="26" y2="25" stroke="#67E8F9" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
    </g>
    <g transform="translate(412 227)">
      <rect width="52" height="34" rx="8" fill="#0E1730" stroke="#67E8F9" stroke-width="2.5" opacity="0.95"/>
      <line x1="10" y1="11" x2="38" y2="11" stroke="#A7F3FC" stroke-width="4" stroke-linecap="round"/>
      <line x1="10" y1="18" x2="28" y2="18" stroke="#67E8F9" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
      <line x1="10" y1="25" x2="42" y2="25" stroke="#67E8F9" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
    </g>
    <!-- a log line escaping through the enso gap -->
    <g transform="translate(372 92) rotate(8)">
      <rect width="46" height="30" rx="7" fill="#0E1730" stroke="#F6C453" stroke-width="2.5" opacity="0.95"/>
      <line x1="9" y1="10" x2="30" y2="10" stroke="#F6C453" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
      <line x1="9" y1="17" x2="37" y2="17" stroke="#A7F3FC" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
      <line x1="9" y1="24" x2="22" y2="24" stroke="#67E8F9" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
    </g>
  </g>
</svg>
